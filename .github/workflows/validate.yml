name: validate

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep-rules-validate:
    name: semgrep-rules-validate
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - name: prettier-check
        uses: creyD/prettier_action@8c18391fdc98ed0d884c6345f03975edac71b8f0 # v4.6
        with:
          dry: True
          prettier_options: --check **/*.{yaml,yml}
      - name: install-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.9
      - name: install-semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
      - name: semgrep-validate
        run: semgrep --config rules --validate
      - name: semgrep-test
        run: semgrep --test --test-ignore-todo
      - name: clone-semgrep-rules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: semgrep/semgrep-rules
          path: tmp
          fetch-depth: 1
          persist-credentials: false
      - name: install-python-dependencies
        run: python -m pip install --upgrade pip && python -m pip install pyyaml jsonschema
      - name: validate-metadata
        run: python ./tmp/.github/scripts/validate-metadata.py -s ./tmp/metadata-schema.yaml.schm -f ../rules

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
