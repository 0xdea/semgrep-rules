name: validate

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  semgrep-rules-validate:
    name: semgrep-rules-validate
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false
      - name: prettier-check
        uses: creyD/prettier_action@8c18391fdc98ed0d884c6345f03975edac71b8f0 # v4.6
        with:
          dry: True
          prettier_options: --check **/*.{yaml,yml}
      - name: python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
      - name: semgrep-validate
        run: semgrep --config rules --validate
      - name: semgrep-test
        run: semgrep --test --test-ignore-todo
      - name: clone-semgrep-rules
        uses: actions/checkout@v6
        with:
          repository: semgrep/semgrep-rules
          path: tmp
          fetch-depth: 1
          persist-credentials: false
      - name: install-python-dependencies
        run: python -m pip install --upgrade pip && python -m pip install pyyaml jsonschema
      - name: validate-metadata
        run: python /tmp/.github/scripts/validate-metadata.py -s /tmp/metadata-schema.yaml.schm -f .
