rules:
  - id: raptor-insecure-api-mktemp-tmpnam-tempnam
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory: audit
      vulnerability_class: Dangerous Method or Function
      likelihood: MEDIUM
      impact: MEDIUM
      confidence: HIGH
      technology:
        - c
        - cpp
      cwe:
        - "CWE-377: Insecure Temporary File"
        - "CWE-367: Time-of-check Time-of-use (TOCTOU) Race Condition"
      references:
        - https://g.co/kgs/PCHQjJ
    message: >-
      Creating and using insecure temporary files can leave application and
      system data vulnerable to attack.
    severity: WARNING
    languages:
      - c
      - cpp
    pattern-either:
      - pattern: mktemp(...)
      - pattern: tmpnam(...)
      - pattern: tempnam(...)
      - pattern: tmpnam_r(...)
      # - pattern: _mktemp(...)
      # - pattern: _tmpnam(...)
      # - pattern: _tempnam(...)
      # - pattern: GetTempFileName(...)
