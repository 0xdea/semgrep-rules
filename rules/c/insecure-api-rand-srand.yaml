rules:
  - id: raptor-insecure-api-rand-srand
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory: 
        - vuln
      vulnerability_class: Cryptographic Issues
      likelihood: MEDIUM
      impact: MEDIUM
      confidence: HIGH
      technology:
        - c
        - cpp
      cwe:
        - "CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator (PRNG)"
        - "CWE-330: Use of Insufficiently Random Values"
      owasp:
        - A04:2025 - Cryptographic Failures
      references:
        - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    message: >-
      The rand() PRNG should not be used in applications intended to be 
      portable when good randomness is needed. Instead, the use of random() 
      is recommended.
    severity: WARNING
    languages:
      - c
      - cpp
    # NOTE: `rand_r` and other non-standard PRNGs are not covered.
    # NOTE: improperly seeded strong PRNGs are not covered.
    # NOTE: refer also to `cpp.lang.security.rng.*`, `cpp.lang.security.crypto.*`, and `gitlab.flawfinder.*`.
    pattern-either:
      - pattern: rand(...)
      - pattern: srand(...)
      - pattern: drand48(...)
      - pattern: erand48(...)
      - pattern: lrand48(...)
      - pattern: nrand48(...)
      - pattern: mrand48(...)
      - pattern: jrand48(...)
      - pattern: lcong48(...)
      - pattern: srand48(...)
      - pattern: seed48(...)
