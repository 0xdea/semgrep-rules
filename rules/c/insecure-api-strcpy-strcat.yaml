rules:
  - id: raptor-insecure-api-strcpy-strcat
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory:
        - vuln
      vulnerability_class: Dangerous Method or Function
      likelihood: HIGH
      impact: HIGH
      confidence: HIGH
      technology:
        - c
        - cpp
      cwe:
        - "CWE-676: Use of Potentially Dangerous Function"
        - "CWE-120: Buffer Copy without Checking Size of Input ('Classic Buffer Overflow')"
        - "CWE-787: Out-of-bounds Write"
      owasp:
        - A10:2025 - Mishandling of Exceptional Conditions
      references:
        - https://g.co/kgs/PCHQjJ
    message: >-
      A buffer overflow condition exists when a program attempts to put
      more data in a buffer than it can hold, or when a program attempts to
      put data in a memory area outside of the boundaries of a buffer.
    severity: ERROR
    languages:
      - c
      - cpp
    # NOTE: some functions, such as `_fstrcpy` and `_fstrcat`, are not covered.
    patterns:
      - pattern-either:
          - pattern: strcpy(...)
          - pattern: stpcpy(...)
          - pattern: strcat(...)
          - pattern: wcscpy(...)
          - pattern: wcpcpy(...)
          - pattern: wcscat(...)
          - pattern: _mbscpy(...)
          - pattern: _mbscat(...)
          - pattern: strccpy(...)
          - pattern: strcadd(...)
          - pattern: streadd(...)
          - pattern: strecpy(...)
          - pattern: strtrns(...)
      - pattern-not: $_($_, "...", ...)
