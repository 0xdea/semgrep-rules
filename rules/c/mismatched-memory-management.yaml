rules:
  - id: raptor-mismatched-memory-management
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory:
        - vuln
      vulnerability_class: Memory Issues
      likelihood: LOW
      impact: MEDIUM
      confidence: LOW
      technology:
        - c
        - cpp
      cwe:
        - "CWE-762: Mismatched Memory Management Routines"
      owasp:
        - A06:2025 - Insecure Design
      references:
        - https://github.com/struct/mms
    message: >-
      The software attempts to return a memory resource to the system, but
      it calls a release function that is not compatible with the function
      that was originally used to allocate that resource.
      Due to inherent limitations of Semgrep, this rule might generate many
      false positives and should therefore be customized for your codebase.
    severity: INFO
    languages:
      - c
      - cpp
    # NOTE: `valloc`, `reallocf`, `aligned_alloc`, and custom wrappers are not covered.
    # NOTE: `VirtualAlloc/VirtualFree` and `mmap/munmap` are not covered.
    pattern-either:
      # free
      - patterns:
          - pattern: free($PTR)
          - pattern-not-inside: |
              $PTR = malloc(...);
              ...
          - pattern-not-inside: |
              $PTR = calloc(...);
              ...
          - pattern-not-inside: |
              $PTR = realloc(...);
              ...
          - pattern-not-inside: |
              $PTR = strdup(...);
              ...
          - pattern-not-inside: |
              $PTR = strndup(...);
              ...
