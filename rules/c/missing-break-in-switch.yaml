rules:
  - id: raptor-missing-break-in-switch
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory: 
        - audit
      vulnerability_class: Other Security
      likelihood: LOW
      impact: LOW
      confidence: LOW
      technology:
        - c
        - cpp
      cwe:
        - "CWE-484: Omitted Break Statement in Switch"
      owasp:
        - A08:2025 - Software or Data Integrity Failures
      references:
        - https://g.co/kgs/PCHQjJ
        - https://github.com/struct/mms
        - https://github.com/returntocorp/semgrep/issues/4939
    message: >-
      The software omits a break statement within a switch or similar
      construct, causing code associated with multiple conditions to
      execute. This can cause problems when the programmer only intended to
      execute code associated with one condition.
    severity: INFO
    languages:
      - c
      - cpp
    # NOTE: we should also check for default blocks that miss the `break/return/exit/goto` or equivalent statement/function call.
    patterns:
      - pattern: |
          switch ($VAR) { case $VAL1: ... case $VAL2: ... }
      # break
      - pattern-not: |
          switch ($VAR) { case $VAL1: ... break; case $VAL2: ... }
      - pattern-not: |
          switch ($VAR) { case $VAL1: break; case $VAL2: ... }
      # exit
      - pattern-not: |
          switch ($VAR) { case $VAL1: ... exit($_); case $VAL2: ... }
      - pattern-not: |
          switch ($VAR) { case $VAL1: exit($_); case $VAL2: ... }
      # return
      - pattern-not: |
          switch ($VAR) { case $VAL1: ... return; case $VAL2: ... }
      - pattern-not: |
          switch ($VAR) { case $VAL1: return; case $VAL2: ... }
      - pattern-not: |
          switch ($VAR) { case $VAL1: ... return $_; case $VAL2: ... }
      - pattern-not: |
          switch ($VAR) { case $VAL1: return $_; case $VAL2: ... }
      # goto
      - pattern-not: |
          switch ($VAR) { case $VAL1: ... goto $_; case $VAL2: ... }
      - pattern-not: |
          switch ($VAR) { case $VAL1: goto $_; case $VAL2: ... }
      # throw (C++)
      # - pattern-not: |
      #     switch ($VAR) { case $VAL1: ... throw $_; case $VAL2: ... }
      # - pattern-not: |
      #     switch ($VAR) { case $VAL1: throw $_; case $VAL2: ... }
      # improve output readability
      - focus-metavariable: $VAR
