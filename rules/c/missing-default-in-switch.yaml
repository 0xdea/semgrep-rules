rules:
  - id: raptor-missing-default-in-switch
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory: audit
      vulnerability_class: Other Security
      likelihood: LOW
      impact: LOW
      confidence: LOW
      technology:
        - c
        - cpp
      cwe:
        - "CWE-478: Missing Default Case in Multiple Condition Expression"
      references:
        - https://g.co/kgs/PCHQjJ
        - https://github.com/struct/mms
        - https://github.com/returntocorp/semgrep/issues/4939
    message: >-
      The code does not have a default case in an expression with multiple
      conditions, such as a switch statement.
    severity: INFO
    languages:
      - c
      - cpp
    patterns:
      - pattern: |
          switch ($VAR) { }
      - pattern-not: |
          switch ($VAR) { default: ... }
      # improve output readability
      - focus-metavariable: $VAR
