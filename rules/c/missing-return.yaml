rules:
  - id: raptor-missing-return
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory:
        - audit
      vulnerability_class: Other Security
      likelihood: LOW
      impact: LOW
      confidence: LOW
      technology:
        - c
        - cpp
      cwe:
        - "CWE-393: Return of Wrong Status Code"
        - "CWE-394: Unexpected Status Code or Return Value"
      owasp:
        - A08:2025 - Software or Data Integrity Failures
      references:
        - https://stackoverflow.com/questions/10858391/why-do-programs-in-c-compile-even-when-the-return-statement-is-missing
    message: >-
      A non-void function does not have a return statement. Hence, its
      return value can be considered undefined.
    severity: INFO
    languages:
      - c
      - cpp
    # NOTE: C++ class declarations should also be excluded, but apparently this pattern is not supported by Semgrep.
    patterns:
      - pattern: $_ $FUN(...) { ... }
      # exclude function declarations
      - pattern-not: $_ $FUN(...);
      # exclude functions with return statement
      - pattern-not: $_ $FUN(...) { ... return $_; }
      # exclude main function
      - pattern-not: int main(...) { ... }
      # exclude void functions
      - pattern-not: void $FUN(...) { ... }
      # improve output readability
      - focus-metavariable: $FUN
      # exclude else if (commented-out for performance reasons)
      # - pattern-not: ... if ($COND) { ... }
