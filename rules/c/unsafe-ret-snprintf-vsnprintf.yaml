rules:
  - id: raptor-unsafe-ret-snprintf-vsnprintf
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory: audit
      vulnerability_class: Memory Issues
      likelihood: MEDIUM
      impact: HIGH
      confidence: MEDIUM
      technology:
        - c
        - cpp
      cwe:
        - "CWE-131: Incorrect Calculation of Buffer Size"
      references:
        - https://lwn.net/Articles/507319/
        - https://g.co/kgs/PCHQjJ
        - https://dustri.org/b/playing-with-weggli.html
    message: >-
      The snprintf() and vsnprintf() functions return the total length of
      the string they tried to create. Therefore, this return value can be
      larger than the size of the destination buffer. If it is used
      unsafely, e.g. as an index to write to the destination buffer, memory
      corruption might occur.
    severity: WARNING
    languages:
      - c
      - cpp
    # NOTE: for another approach that uses taint mode, refer to `cpp.lang.security.strings.snprintf-return-value-length.snprintf-return-value-length`.
    patterns:
      - pattern-either:
          - pattern: $_ = $FUN($_, $_, $FMT, ...)
          - pattern: $_ += $FUN($_, $_, $FMT, ...)
      - metavariable-pattern:
          metavariable: $FUN
          pattern-either:
            - pattern: snprintf
            - pattern: vsnprintf
            # swprintf and vswprintf return a negative value if n or more
            # widechars were requested to be written, thus behaving more safely
      - metavariable-regex:
          metavariable: $FMT
          # NOTE: some format string specifiers are not handled
          regex: '(".*%l?s.*"|".*%S.*"|[a-zA-Z_][a-zA-Z0-9_]*)'
