rules:
  - id: raptor-use-of-source-size-in-copy
    metadata:
      author: Marco Ivaldi <raptor@0xdeadbeef.info>
      category: security
      subcategory: 
        - vuln
      vulnerability_class: Memory Issues
      likelihood: MEDIUM
      impact: HIGH
      confidence: MEDIUM
      technology:
        - c
        - cpp
      cwe:
        - "CWE-806: Buffer Access Using Size of Source Buffer"
      owasp:
        - A06:2025 - Insecure Design
      references:
        - https://github.com/0xdea/advisories/blob/master/2020-07-solaris-whodo-w.txt
        - https://dustri.org/b/playing-with-weggli.html
    message: >-
      The software uses the size of a source buffer when reading from or
      writing to a destination buffer, which may cause it to access memory
      that is outside of the bounds of the buffer.
    severity: ERROR
    languages:
      - c
      - cpp
    # NOTE: some copy functions such as `memccpy`, `bcopy`, and `strcpy_s` are not covered.
    # NOTE: `strlen` before the copy function is not covered.
    # NOTE: structs are not covered.
    pattern-either:
      # size of array
      - patterns:
          - pattern: $FUN($DST, $SRC, $LEN)
          - pattern-not: $FUN($DST, "...", $LEN)
          - metavariable-pattern:
              metavariable: $FUN
              pattern-either:
                - pattern: strncpy
                - pattern: stpncpy
                - pattern: strlcpy
                - pattern: strscpy
                - pattern: memcpy
                - pattern: memmove
                - pattern: wmemcpy
                - pattern: wmemmove
                - pattern: mempcpy
                - pattern: wmempcpy
          - pattern-either:
              - patterns:
                  - pattern-inside: |
                      $_ $SRC[$LEN];
                      ...
                  - pattern-not-inside: |
                      $_ $DST[$LEN];
                      ...
                  - pattern-not-inside: |
                      $_ $DST[$LEN] = ...;
                      ...
              - patterns:
                  - pattern-inside: |
                      $_ $SRC[$LEN] = ...;
                      ...
                  - pattern-not-inside: |
                      $_ $DST[$LEN];
                      ...
                  - pattern-not-inside: |
                      $_ $DST[$LEN] = ...;
                      ...
      # sizeof operator, strlen, and similar
      - patterns:
          - pattern: $FUN($DST, $SRC, <... $SRC ...>)
          - pattern-not: $FUN($DST, "...", <... $SRC ...>)
          # - pattern-not: $FUN($DST, $SRC, <... $DST ...>)
          - metavariable-pattern:
              metavariable: $FUN
              pattern-either:
                - pattern: strncpy
                - pattern: stpncpy
                - pattern: strlcpy
                - pattern: strscpy
                - pattern: memcpy
                - pattern: memmove
                - pattern: wmemcpy
                - pattern: wmemmove
                - pattern: mempcpy
                - pattern: wmempcpy
      # snprintf
      - patterns:
          - pattern: $FUN($DST, <... $SRC ...>, ..., $SRC, ...)
          # - pattern-not: $FUN($DST, <... $DST ...>, ..., $SRC, ...)
          - metavariable-pattern:
              metavariable: $FUN
              pattern-either:
                - pattern: snprintf
                - pattern: vsnprintf
                - pattern: swprintf
                - pattern: vswprintf
